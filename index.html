<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>声音派对乐园 - /g/ 和 /d/ 辨识游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #FFE5B4 0%, #FFCCE5 50%, #E5CCFF 100%);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        @keyframes rainbow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .rainbow-bg {
            background: linear-gradient(270deg, #ff9a9e, #fecfef, #fecfef, #a8edea, #fed6e3, #d299c2, #fef9d7);
            background-size: 400% 400%;
            animation: rainbow 3s ease infinite;
        }

        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            top: -10px;
            animation: confetti-fall 3s linear forwards;
            z-index: 9999;
        }

        @keyframes confetti-fall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

        .header {
            text-align: center;
            padding: 20px 10px;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        h1 {
            color: #FF6B9D;
            font-size: 28px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .stars-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
        }

        .star {
            font-size: 30px;
            filter: grayscale(100%);
            opacity: 0.3;
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .star.active {
            filter: grayscale(0%);
            opacity: 1;
            animation: star-pop 0.6s ease;
            text-shadow: 0 0 20px #FFD700;
        }

        @keyframes star-pop {
            0% { transform: scale(0) rotate(0deg); }
            50% { transform: scale(1.4) rotate(180deg); }
            100% { transform: scale(1) rotate(360deg); }
        }

        .level-indicator {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 5px 20px;
            border-radius: 20px;
            font-size: 16px;
            display: inline-block;
            margin-top: 10px;
            font-weight: bold;
        }

        .game-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            padding-bottom: 100px;
        }

        .characters-row {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin: 30px 0;
            gap: 20px;
            flex-wrap: wrap;
        }

        .character-btn {
            flex: 1;
            min-width: 140px;
            max-width: 200px;
            aspect-ratio: 1;
            border: none;
            border-radius: 30px;
            background: white;
            box-shadow: 0 10px 0 rgba(0,0,0,0.2), 0 10px 20px rgba(0,0,0,0.1);
            cursor: pointer;
            position: relative;
            transition: all 0.1s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            user-select: none;
        }

        .character-btn:active {
            transform: translateY(10px);
            box-shadow: 0 0 0 rgba(0,0,0,0.2), 0 0 5px rgba(0,0,0,0.1);
        }

        @keyframes bounce-win {
            0%, 100% { transform: translateY(0) scale(1); }
            25% { transform: translateY(-30px) scale(1.1); }
            50% { transform: translateY(0) scale(1.05); }
            75% { transform: translateY(-15px) scale(1.02); }
        }

        .bounce {
            animation: bounce-win 0.8s ease;
            background: #90EE90 !important;
        }

        @keyframes shake-head {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-10px) rotate(-5deg); }
            20%, 40%, 60%, 80% { transform: translateX(10px) rotate(5deg); }
        }

        .shake {
            animation: shake-head 0.6s ease;
            background: #FFB6C1 !important;
        }

        @keyframes dance {
            0%, 100% { transform: rotate(0deg) translateY(0); }
            25% { transform: rotate(-10deg) translateY(-10px); }
            50% { transform: rotate(0deg) translateY(0); }
            75% { transform: rotate(10deg) translateY(-10px); }
        }

        .dancing {
            animation: dance 0.5s ease infinite;
        }

        .character-label {
            font-size: 18px;
            font-weight: bold;
            color: #666;
            margin-top: 10px;
            background: rgba(255,255,255,0.9);
            padding: 5px 15px;
            border-radius: 15px;
        }

        .sound-text {
            font-size: 24px;
            color: #FF6B9D;
            font-weight: bold;
            margin-top: 5px;
        }

        .control-section {
            text-align: center;
            margin: 40px 0;
            position: relative;
        }

        .big-speaker-btn {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #FFD93D 0%, #FF6B6B 100%);
            color: white;
            font-size: 60px;
            cursor: pointer;
            box-shadow: 0 8px 0 #d4a017, 0 15px 30px rgba(0,0,0,0.2);
            transition: all 0.1s;
            position: relative;
            z-index: 10;
        }

        .big-speaker-btn:active {
            transform: translateY(8px);
            box-shadow: 0 0 0 #d4a017, 0 5px 10px rgba(0,0,0,0.2);
        }

        .big-speaker-btn.pulse {
            animation: pulse-ring 2s infinite;
        }

        @keyframes pulse-ring {
            0% { box-shadow: 0 0 0 0 rgba(255, 107, 107, 0.7); }
            70% { box-shadow: 0 0 0 30px rgba(255, 107, 107, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 107, 107, 0); }
        }

        .sound-waves {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 8px;
            height: 60px;
            margin-top: 30px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .sound-waves.active {
            opacity: 1;
        }

        .wave-bar {
            width: 12px;
            background: linear-gradient(to top, #667eea, #764ba2);
            border-radius: 6px;
            animation: wave 0.8s ease-in-out infinite;
        }

        .wave-bar:nth-child(1) { height: 20%; animation-delay: 0s; }
        .wave-bar:nth-child(2) { height: 40%; animation-delay: 0.1s; }
        .wave-bar:nth-child(3) { height: 60%; animation-delay: 0.2s; }
        .wave-bar:nth-child(4) { height: 40%; animation-delay: 0.3s; }
        .wave-bar:nth-child(5) { height: 20%; animation-delay: 0.4s; }

        @keyframes wave {
            0%, 100% { transform: scaleY(0.5); }
            50% { transform: scaleY(1.5); }
        }

        .instruction-text {
            font-size: 20px;
            color: #555;
            margin-top: 20px;
            font-weight: bold;
            min-height: 30px;
            padding: 10px;
            background: rgba(255,255,255,0.6);
            border-radius: 15px;
            display: inline-block;
        }

        .flash-green {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 255, 0, 0.3);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 50;
        }

        .flash-green.show {
            opacity: 1;
            animation: flash 0.5s ease;
        }

        @keyframes flash {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }

        .celebration-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            flex-direction: column;
        }

        .celebration-modal.show {
            display: flex;
        }

        .celebration-content {
            background: white;
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            animation: pop-in 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            max-width: 90%;
            width: 400px;
        }

        @keyframes pop-in {
            0% { transform: scale(0) rotate(-180deg); }
            100% { transform: scale(1) rotate(0deg); }
        }

        .celebration-content h2 {
            color: #FF6B9D;
            font-size: 36px;
            margin-bottom: 20px;
        }

        .celebration-content .trophy {
            font-size: 80px;
            margin: 20px 0;
            animation: trophy-bounce 1s ease infinite;
        }

        @keyframes trophy-bounce {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-20px) scale(1.1); }
        }

        .restart-btn {
            margin-top: 30px;
            padding: 15px 40px;
            font-size: 24px;
            border: none;
            border-radius: 50px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            cursor: pointer;
            box-shadow: 0 6px 0 #4a5568, 0 10px 20px rgba(0,0,0,0.2);
            transition: all 0.1s;
        }

        .restart-btn:active {
            transform: translateY(6px);
            box-shadow: 0 0 0 #4a5568, 0 5px 10px rgba(0,0,0,0.2);
        }

        @media (max-width: 600px) {
            h1 { font-size: 22px; }
            .character-btn { 
                min-width: 120px; 
                font-size: 50px;
                border-radius: 20px;
            }
            .character-label { font-size: 16px; }
            .big-speaker-btn {
                width: 100px;
                height: 100px;
                font-size: 50px;
            }
        }

        .start-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            flex-direction: column;
        }

        .start-btn {
            padding: 20px 50px;
            font-size: 28px;
            background: linear-gradient(135deg, #FF6B9D 0%, #FF8E53 100%);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 0 #c85a7a, 0 15px 30px rgba(0,0,0,0.3);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .start-btn:active {
            transform: translateY(8px) scale(0.95);
            box-shadow: 0 0 0 #c85a7a, 0 5px 10px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <!-- 开始遮罩 -->
    <div class="start-overlay" id="startOverlay">
        <div style="font-size: 80px; margin-bottom: 20px;">🎉🎮🎉</div>
        <h2 style="color: #FF6B9D; font-size: 32px; margin-bottom: 30px;">声音派对乐园</h2>
        <p style="color: #666; font-size: 18px; margin-bottom: 30px; text-align: center; padding: 0 20px;">
            点击按钮开始游戏<br>
            请打开声音 🔊
        </p>
        <button class="start-btn" id="startBtn">开始游戏 ▶️</button>
    </div>

    <!-- 闪光层 -->
    <div class="flash-green" id="flashGreen"></div>

    <!-- 头部 -->
    <div class="header">
        <h1>🎵 声音派对乐园 🎵</h1>
        <div class="stars-container" id="starsContainer">
            <span class="star">⭐</span>
            <span class="star">⭐</span>
            <span class="star">⭐</span>
        </div>
        <div class="level-indicator" id="levelIndicator">第 1 组</div>
    </div>

    <!-- 游戏区 -->
    <div class="game-container">
        <!-- 角色区 -->
        <div class="characters-row" id="charactersRow">
            <button class="character-btn" id="charLeft">
                <span id="emojiLeft">🦆</span>
                <div class="character-label" id="labelLeft">小鸭子</div>
                <div class="sound-text" id="soundLeft">嘎嘎嘎</div>
            </button>
            
            <button class="character-btn" id="charRight">
                <span id="emojiRight">🐴</span>
                <div class="character-label" id="labelRight">小马</div>
                <div class="sound-text" id="soundRight">哒哒哒</div>
            </button>
        </div>

        <!-- 控制区 -->
        <div class="control-section">
            <button class="big-speaker-btn pulse" id="speakerBtn">
                🔊
            </button>
            
            <div class="sound-waves" id="soundWaves">
                <div class="wave-bar"></div>
                <div class="wave-bar"></div>
                <div class="wave-bar"></div>
                <div class="wave-bar"></div>
                <div class="wave-bar"></div>
            </div>

            <div class="instruction-text" id="instruction">
                先点击上面的角色按钮认识它们吧！
            </div>
        </div>
    </div>

    <!-- 庆祝弹窗 -->
    <div class="celebration-modal" id="celebrationModal">
        <div class="celebration-content">
            <div class="trophy">🏆</div>
            <h2>太棒了！</h2>
            <p style="font-size: 20px; color: #666; margin: 20px 0;">
                你完成了所有挑战！<br>
                真是个声音小达人！
            </p>
            <button class="restart-btn" id="restartBtn">
                再玩一次 🔄
            </button>
        </div>
    </div>

    <script>
        // 游戏数据
        const gameData = [
            {
                left: { emoji: '🦆', name: '小鸭子', sound: '嘎嘎嘎', intro: '我是小鸭子，嘎嘎嘎', phoneme: 'g' },
                right: { emoji: '🐴', name: '小马', sound: '哒哒哒', intro: '我是小马，哒哒哒', phoneme: 'd' }
            },
            {
                left: { emoji: '🎂', name: '蛋糕', sound: '糕糕糕', intro: '我是蛋糕，糕糕糕', phoneme: 'g' },
                right: { emoji: '🔪', name: '小刀', sound: '刀刀刀', intro: '我是小刀，刀刀刀', phoneme: 'd' }
            },
            {
                left: { emoji: '🕊️', name: '鸽子', sound: '咕咕咕', intro: '我是鸽子，咕咕咕', phoneme: 'g' },
                right: { emoji: '📢', name: '喇叭', sound: '嘟嘟嘟', intro: '我是喇叭，嘟嘟嘟', phoneme: 'd' }
            },
            {
                left: { emoji: '🐓', name: '公鸡', sound: '公公公', intro: '我是公鸡，公公公', phoneme: 'g' },
                right: { emoji: '🚪', name: '敲门', sound: '咚咚咚', intro: '我是敲门，咚咚咚', phoneme: 'd' }
            }
        ];

        // 游戏状态
        let currentLevel = 0;
        let correctStreak = 0;
        let isSpeaking = false;
        let isIntroduced = [false, false];
        let currentTarget = null;
        let audioCtx = null;
        let synth = null;
        let voices = [];

        // 初始化语音合成
        function initSpeech() {
            if (!('speechSynthesis' in window)) {
                alert('您的浏览器不支持语音合成，请使用 Chrome、Edge 或 Safari');
                return false;
            }

            synth = window.speechSynthesis;
            
            function loadVoices() {
                voices = synth.getVoices();
            }
            
            loadVoices();
            
            if (voices.length === 0) {
                synth.addEventListener('voiceschanged', loadVoices, { once: true });
            }
            
            return true;
        }

        // 获取中文语音
        function getChineseVoice() {
            if (!voices || voices.length === 0) {
                voices = synth.getVoices();
            }
            const zhVoice = voices.find(v => v.lang.includes('zh') || v.lang.includes('cmn'));
            return zhVoice || voices[0];
        }

        // 语音合成函数 - 移除"正在说"文字提示
        function speak(text, rate = 0.7, pitch = 1.2, onEnd = null) {
            if (!synth) return;

            synth.cancel();

            const utterance = new SpeechSynthesisUtterance(text);
            const voice = getChineseVoice();
            if (voice) utterance.voice = voice;
            
            utterance.lang = 'zh-CN';
            utterance.rate = rate;
            utterance.pitch = pitch;
            utterance.volume = 1;

            utterance.onstart = () => {
                isSpeaking = true;
                document.getElementById('soundWaves').classList.add('active');
            };

            utterance.onend = () => {
                isSpeaking = false;
                document.getElementById('soundWaves').classList.remove('active');
                if (onEnd) onEnd();
            };

            utterance.onerror = () => {
                isSpeaking = false;
                document.getElementById('soundWaves').classList.remove('active');
            };

            synth.speak(utterance);
        }

        // 初始化音频上下文
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        // 播放叮叮声
        function playDingDing() {
            initAudio();
            const now = audioCtx.currentTime;
            
            for (let i = 0; i < 3; i++) {
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                
                oscillator.frequency.value = 1200 + (i * 200);
                oscillator.type = 'sine';
                
                gainNode.gain.setValueAtTime(0.3, now + i * 0.15);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + i * 0.15 + 0.5);
                
                oscillator.start(now + i * 0.15);
                oscillator.stop(now + i * 0.15 + 0.5);
            }
        }

        // 开始游戏
        function startGame() {
            document.getElementById('startOverlay').style.display = 'none';
            initAudio();
            initSpeech();
            
            setTimeout(() => {
                speak('欢迎来到声音派对乐园！我是你的语音小伙伴。请先点击上面的角色按钮认识它们吧！', 0.8, 1.2);
            }, 500);
            
            loadLevel();
        }

        // 加载关卡
        function loadLevel() {
            const data = gameData[currentLevel];
            
            document.getElementById('emojiLeft').textContent = data.left.emoji;
            document.getElementById('labelLeft').textContent = data.left.name;
            document.getElementById('soundLeft').textContent = data.left.sound;
            
            document.getElementById('emojiRight').textContent = data.right.emoji;
            document.getElementById('labelRight').textContent = data.right.name;
            document.getElementById('soundRight').textContent = data.right.sound;
            
            document.getElementById('levelIndicator').textContent = `第 ${currentLevel + 1} 组`;
            
            isIntroduced = [false, false];
            currentTarget = null;
            
            document.getElementById('charLeft').className = 'character-btn';
            document.getElementById('charRight').className = 'character-btn';
            
            setTimeout(() => {
                speak('新的伙伴来了！点击它们来认识一下吧！', 0.8, 1.2);
            }, 300);
            
            updateInstruction('先点击上面的角色按钮认识它们吧！');
        }

        // 选择角色（介绍阶段）
        function selectCharacter(side) {
            const data = gameData[currentLevel];
            const charData = side === 0 ? data.left : data.right;
            const btn = side === 0 ? document.getElementById('charLeft') : document.getElementById('charRight');
            
            if (isSpeaking) return;
            
            isIntroduced[side] = true;
            
            // 按钮按下效果
            btn.style.transform = 'translateY(10px)';
            btn.style.boxShadow = '0 0 0 rgba(0,0,0,0.2), 0 0 5px rgba(0,0,0,0.1)';
            setTimeout(() => {
                btn.style.transform = '';
                btn.style.boxShadow = '';
            }, 200);
            
            // 播放介绍语音
            speak(charData.intro, 0.6, 1.3, () => {
                if (isIntroduced[0] && isIntroduced[1]) {
                    setTimeout(() => {
                        updateInstruction('现在点击大喇叭听挑战声音！');
                        speak('很好！现在点击中间的大喇叭，听听看是谁的声音？', 0.8, 1.2);
                        document.getElementById('speakerBtn').classList.add('pulse');
                    }, 500);
                }
            });
        }

        // 播放挑战声音
        function playChallenge() {
            if (isSpeaking) return;
            
            currentTarget = Math.random() > 0.5 ? 0 : 1;
            const data = gameData[currentLevel];
            const targetData = currentTarget === 0 ? data.left : data.right;
            
            document.getElementById('speakerBtn').classList.remove('pulse');
            
            updateInstruction('听好了...是谁的声音？');
            
            const challengeText = `听一听...${targetData.sound}...这是谁的声音？`;
            speak(challengeText, 0.5, 1.0, () => {
                updateInstruction('选择左边还是右边？');
            });
        }

        // 检查答案
        function checkAnswer(selected) {
            if (currentTarget === null) {
                speak('请先点击大喇叭听声音哦！', 0.8, 1.2);
                return;
            }
            
            const isCorrect = selected === currentTarget;
            const btn = selected === 0 ? document.getElementById('charLeft') : document.getElementById('charRight');
            
            if (isCorrect) {
                btn.classList.add('bounce');
                playDingDing();
                
                const flash = document.getElementById('flashGreen');
                flash.classList.add('show');
                setTimeout(() => flash.classList.remove('show'), 500);
                
                correctStreak++;
                updateStars();
                
                setTimeout(() => {
                    document.getElementById('charLeft').classList.add('dancing');
                    document.getElementById('charRight').classList.add('dancing');
                }, 800);
                
                speak('答对了！真棒！', 0.8, 1.4, () => {
                    document.getElementById('charLeft').classList.remove('dancing');
                    document.getElementById('charRight').classList.remove('dancing');
                    btn.classList.remove('bounce');
                    
                    if (correctStreak >= 3) {
                        triggerSurprise();
                    } else {
                        currentTarget = null;
                        setTimeout(() => {
                            speak('我们再听一次！点击大喇叭！', 0.8, 1.2);
                            document.getElementById('speakerBtn').classList.add('pulse');
                        }, 1000);
                    }
                });
                
            } else {
                btn.classList.add('shake');
                speak('再听一次哦！点击大喇叭再试试！', 0.7, 0.9, () => {
                    btn.classList.remove('shake');
                    currentTarget = null;
                    document.getElementById('speakerBtn').classList.add('pulse');
                });
                
                correctStreak = 0;
                updateStars();
            }
        }

        // 更新星星
        function updateStars() {
            const starElements = document.querySelectorAll('.star');
            starElements.forEach((star, index) => {
                if (index < correctStreak) {
                    star.classList.add('active');
                } else {
                    star.classList.remove('active');
                }
            });
        }

        // 触发惊喜
        function triggerSurprise() {
            createConfetti();
            speak('太厉害了！连对三次！所有伙伴一起跳舞庆祝！', 0.8, 1.3);
            
            document.getElementById('charLeft').classList.add('dancing');
            document.getElementById('charRight').classList.add('dancing');
            
            setTimeout(() => {
                document.getElementById('charLeft').classList.remove('dancing');
                document.getElementById('charRight').classList.remove('dancing');
                
                currentLevel++;
                correctStreak = 0;
                updateStars();
                
                if (currentLevel >= gameData.length) {
                    showFinalCelebration();
                } else {
                    loadLevel();
                }
            }, 3000);
        }

        // 撒花效果
        function createConfetti() {
            const colors = ['#ff6b6b', '#ffd93d', '#6bcf7f', '#4d96ff', '#ff6b9d', '#c44569'];
            
            for (let i = 0; i < 50; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';
                    confetti.style.left = Math.random() * 100 + '%';
                    confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                    confetti.style.animationDuration = (Math.random() * 2 + 2) + 's';
                    confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
                    document.body.appendChild(confetti);
                    
                    setTimeout(() => confetti.remove(), 4000);
                }, i * 50);
            }
        }

        // 最终庆祝
        function showFinalCelebration() {
            document.body.classList.add('rainbow-bg');
            document.getElementById('celebrationModal').classList.add('show');
            speak('恭喜你通关了！你是最棒的声音小达人！', 0.8, 1.5);
            createConfetti();
        }

        // 重新开始
        function restartGame() {
            currentLevel = 0;
            correctStreak = 0;
            updateStars();
            document.body.classList.remove('rainbow-bg');
            document.getElementById('celebrationModal').classList.remove('show');
            loadLevel();
        }

        // 更新提示
        function updateInstruction(text) {
            document.getElementById('instruction').textContent = text;
        }

        // 角色按钮点击处理
        function handleCharClick(side) {
            return function() {
                if (currentTarget !== null) {
                    checkAnswer(side);
                } else {
                    selectCharacter(side);
                }
            };
        }

        // 绑定事件
        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('charLeft').addEventListener('click', handleCharClick(0));
        document.getElementById('charRight').addEventListener('click', handleCharClick(1));
        document.getElementById('speakerBtn').addEventListener('click', playChallenge);
        document.getElementById('restartBtn').addEventListener('click', restartGame);

        // 防止移动端双击缩放
        document.addEventListener('touchstart', function(e) {
            if (e.touches.length > 1) e.preventDefault();
        }, { passive: false });

        let lastTouchEnd = 0;
        document.addEventListener('touchend', function(e) {
            const now = Date.now();
            if (now - lastTouchEnd <= 300) e.preventDefault();
            lastTouchEnd = now;
        }, false);
    </script>
</body>
</html>
